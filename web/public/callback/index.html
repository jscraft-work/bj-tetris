<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 중...</title>
</head>
<body>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  const backendBaseUrl = window.location.hostname.endsWith('.jscraft.work')
    ? 'https://tetris-api.jscraft.work'
    : 'http://127.0.0.1:9001';

  fetch(`${backendBaseUrl}/login/oauth2/code/bj-auth?code=${code}&state=${state}`, {
    credentials: 'include',
  })
    .then(res => res.json())
    .then(data => {
      window.location.href = data.redirectUrl || '/';
    })
    .catch(() => {
      window.location.href = '/?authError=login_failed';
    });
</script>
</body>
</html>
