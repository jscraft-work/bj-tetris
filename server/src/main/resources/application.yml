spring:
  application:
    name: bj-tetris-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bj_tetris}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  security:
    oauth2:
      client:
        registration:
          bj-auth:
            client-id: ${AUTH_CLIENT_ID:bj-tetris-web}
            client-authentication-method: none
            authorization-grant-type: authorization_code
            redirect-uri: ${OAUTH_REDIRECT_URI:http://127.0.0.1:5500/callback}
            scope: openid,profile
        provider:
          bj-auth:
            issuer-uri: ${AUTH_ISSUER:http://127.0.0.1:9000}

server:
  port: ${SERVER_PORT:9001}
  servlet:
    session:
      cookie:
        name: BJ_TETRIS_SESSION
        same-site: lax
        secure: ${SESSION_COOKIE_SECURE:false}
      timeout: 14d

app:
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://127.0.0.1:5500}
