<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BJ Tetris</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <!-- LOGIN SCREEN -->
      <section id="screen-login" class="screen">
        <div class="login-form">
          <h1>BJ TETRIS</h1>
          <input id="loginId" type="text" placeholder="ID" autocomplete="off" maxlength="20" />
          <input id="loginPw" type="password" placeholder="Password" maxlength="30" />
          <button id="loginBtn" type="button">LOGIN</button>
          <p id="loginError" class="login-error"></p>
        </div>
      </section>

      <!-- LOBBY SCREEN -->
      <section id="screen-lobby" class="screen screen-hidden">
        <div class="lobby-inner">
          <h1>BJ TETRIS</h1>
          <p id="lobbyUserId" class="lobby-user-id"></p>
          <div class="settings-group">
            <label for="toggleNumberBlocksBtn">넘버블록 (다음 게임부터 적용)</label>
            <button id="toggleNumberBlocksBtn" type="button">NUMBER BLOCKS ON</button>
          </div>
          <div class="settings-group">
            <label for="toggleBgmBtn">BGM</label>
            <button id="toggleBgmBtn" type="button">BGM ON</button>
          </div>
          <div class="settings-group">
            <label for="bgmTrackList">음원 선택</label>
            <div id="bgmTrackList" class="bgm-track-list"></div>
          </div>
          <button id="lobbyStartBtn" type="button" class="lobby-action-btn lobby-start-btn">게임 시작</button>
          <button id="lobbyLogoutBtn" type="button" class="lobby-action-btn lobby-logout-btn">로그아웃</button>
          <button id="lobbyExitBtn" type="button" class="lobby-action-btn lobby-exit-btn">게임 종료</button>
        </div>
      </section>

      <!-- GAME SCREEN -->
      <section id="screen-game" class="screen screen-hidden">
        <section class="hud">
          <div>STATUS: <strong id="statusText">loading</strong></div>
          <div>LEVEL: <strong id="levelText">1</strong></div>
          <div>LINES: <strong id="linesText">0</strong></div>
          <div>SCORE: <strong id="scoreText">0</strong></div>
          <button id="exitToLobbyBtn" type="button">로비</button>
          <button id="restartBtn" type="button">Restart</button>
        </section>
        <section class="play-layout">
          <section class="board-area">
            <div id="overlay" class="overlay hidden" aria-live="polite">
              <h2 id="overlayStatus"></h2>
              <p id="overlaySub"></p>
              <button id="overlayAction" type="button"></button>
            </div>
            <canvas id="gameCanvas" aria-label="Tetris board"></canvas>
          </section>
          <section class="next-panel">
            <h2>NEXT</h2>
            <canvas id="nextCanvas" aria-label="Next block preview"></canvas>
          </section>
        </section>
        <section class="control-bar" aria-label="Touch controls">
          <button id="ctrlLeft" type="button" class="control-btn" data-action="moveLeft">◀</button>
          <button id="ctrlRight" type="button" class="control-btn" data-action="moveRight">▶</button>
          <button id="ctrlRotate" type="button" class="control-btn" data-action="rotate">⟳</button>
          <button id="ctrlSoft" type="button" class="control-btn soft" data-action="softDrop">⇩</button>
          <button id="ctrlHard" type="button" class="control-btn hard" data-action="hardDrop">⤓</button>
          <button id="ctrlPause" type="button" class="control-btn pause" data-action="pause">Ⅱ/▶</button>
        </section>
      </section>
    </main>

    <!-- Confirm Dialog (shared) -->
    <div id="confirmDialog" class="confirm-dialog hidden">
      <div class="confirm-dialog-inner">
        <p id="confirmMessage"></p>
        <div class="confirm-actions">
          <button id="confirmYes" type="button">예</button>
          <button id="confirmNo" type="button">아니오</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
